<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Scientist Resume - Alex Johnson</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: white;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .header {
      text-align: center;
      border-bottom: 2px solid #333;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    .header h1 {
      margin: 0;
      color: #333;
      font-size: 2.5em;
    }
    .header p {
      margin: 5px 0;
      color: #666;
    }
    .section {
      margin-bottom: 30px;
    }
    .section h2 {
      color: #333;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
      font-size: 1.5em;
    }
    .job, .education, .project {
      margin-bottom: 20px;
    }
    .job h3, .education h3, .project h3 {
      margin: 0 0 5px 0;
      color: #444;
    }
    .job .company, .job .location, .education .school, .education .degree {
      color: #666;
      font-style: italic;
    }
    .skills ul {
      display: flex;
      flex-wrap: wrap;
      list-style: none;
      padding: 0;
    }
    .skills li {
      background-color: #e9ecef;
      margin: 5px;
      padding: 5px 10px;
      border-radius: 3px;
    }
    .contact {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }
    .contact span {
      margin: 0 15px;
    }
  </style>
</head>
<body>
  <h1>CV </h1>
  <p>Testing Testing</p>
  <p>Testing2</p>
</body>
</html>
